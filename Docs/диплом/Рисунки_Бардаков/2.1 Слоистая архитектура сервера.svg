<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="860" height="500" fill="#ffffff"/>

  <!-- concentric layers (dependencies point inward) -->
  <rect x="70" y="40" width="620" height="420" rx="16" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
  <text x="380" y="64" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f2d3d">API</text>
  <text x="380" y="84" text-anchor="middle" font-size="12.5" fill="#33475b">REST-контроллеры, хаб SignalR, обработка исключений, композиционный корень</text>

  <rect x="140" y="98" width="480" height="320" rx="14" fill="#d6e6f6" stroke="#34495e" stroke-width="1.5"/>
  <text x="380" y="122" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f2d3d">Infrastructure</text>
  <text x="380" y="142" text-anchor="middle" font-size="12.5" fill="#33475b">EF Core, интеграция с ММИС, LDAP-аутентификация, фоновые службы</text>

  <rect x="210" y="156" width="340" height="220" rx="12" fill="#c4dbf0" stroke="#34495e" stroke-width="1.5"/>
  <text x="380" y="180" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f2d3d">Application</text>
  <text x="380" y="200" text-anchor="middle" font-size="12.5" fill="#33475b">сценарии CQRS, порты,</text>
  <text x="380" y="217" text-anchor="middle" font-size="12.5" fill="#33475b">валидация, подсистема солвера</text>

  <rect x="288" y="244" width="184" height="104" rx="10" fill="#34495e" stroke="#1f2d3d" stroke-width="1.5"/>
  <text x="380" y="288" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#ffffff">Domain</text>
  <text x="380" y="310" text-anchor="middle" font-size="12" fill="#dfe7ef">сущности, инварианты,</text>
  <text x="380" y="326" text-anchor="middle" font-size="12" fill="#dfe7ef">фабрики</text>

  <!-- inward dependency arrow -->
  <line x1="745" y1="430" x2="745" y2="70" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="800" y="250" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#922b21" transform="rotate(90 800 250)">Зависимости направлены внутрь</text>
</svg>

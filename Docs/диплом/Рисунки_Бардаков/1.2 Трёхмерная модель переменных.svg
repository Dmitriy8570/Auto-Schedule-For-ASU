<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34495e"/>
    </marker>
  </defs>
  <rect width="820" height="520" fill="#ffffff"/>

  <!-- depth faces (R axis) -->
  <polygon points="260,140 620,140 710,70 350,70" fill="#dbe7f3" stroke="#34495e" stroke-width="1.3"/>
  <polygon points="620,140 620,360 710,290 710,70" fill="#cdddee" stroke="#34495e" stroke-width="1.3"/>
  <!-- depth hint lines -->
  <line x1="290" y1="117" x2="650" y2="117" stroke="#9bb4cc" stroke-width="1"/>
  <line x1="320" y1="94" x2="680" y2="94" stroke="#9bb4cc" stroke-width="1"/>

  <!-- front face grid (W x T) -->
  <rect x="260" y="140" width="360" height="220" fill="#f4f8fc" stroke="#34495e" stroke-width="1.5"/>
  <!-- highlighted variable cell x_wrt = 1 -->
  <rect x="380" y="195" width="60" height="55" fill="#2e7d4f" fill-opacity="0.85" stroke="#1f3d2a" stroke-width="1.5"/>
  <text x="410" y="228" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">1</text>

  <!-- vertical grid lines -->
  <g stroke="#7f96ad" stroke-width="1">
    <line x1="320" y1="140" x2="320" y2="360"/>
    <line x1="380" y1="140" x2="380" y2="360"/>
    <line x1="440" y1="140" x2="440" y2="360"/>
    <line x1="500" y1="140" x2="500" y2="360"/>
    <line x1="560" y1="140" x2="560" y2="360"/>
    <line x1="260" y1="195" x2="620" y2="195"/>
    <line x1="260" y1="250" x2="620" y2="250"/>
    <line x1="260" y1="305" x2="620" y2="305"/>
  </g>

  <!-- Axis: T (slots) bottom -->
  <line x1="260" y1="385" x2="620" y2="385" stroke="#34495e" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="500" y="408" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2d3d">T — временные слоты недели</text>

  <!-- Axis: W (workloads) left -->
  <line x1="235" y1="360" x2="235" y2="140" stroke="#34495e" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="150" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2d3d" transform="rotate(-90 150 250)">W — единицы нагрузки</text>

  <!-- Axis: R (rooms) depth -->
  <line x1="630" y1="135" x2="715" y2="68" stroke="#34495e" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="700" y="55" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2d3d">R — аудитории</text>

  <!-- legend -->
  <rect x="150" y="440" width="520" height="56" rx="6" fill="#f4f6f8" stroke="#34495e" stroke-width="1.2"/>
  <text x="410" y="465" text-anchor="middle" font-size="14" fill="#1f2d3d">Булева переменная x(w, r, t) &#8712; {0, 1}</text>
  <text x="410" y="486" text-anchor="middle" font-size="13" fill="#33475b">= 1 ⇔ нагрузка w проводится в аудитории r во временном слоте t</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="Segoe UI, Arial, sans-serif">
  <rect width="980" height="470" fill="#ffffff"/>

  <!-- root -->
  <rect x="320" y="24" width="340" height="56" rx="6" fill="#34495e"/>
  <text x="490" y="48" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Методы решения задачи</text>
  <text x="490" y="68" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">составления расписания</text>

  <!-- connectors -->
  <path d="M490,80 L490,108 M165,108 L815,108 M165,108 L165,140 M490,108 L490,140 M815,108 L815,140" fill="none" stroke="#34495e" stroke-width="1.5"/>

  <!-- branch 1: exact -->
  <rect x="25" y="140" width="280" height="270" rx="8" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
  <text x="165" y="166" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f2d3d">Точные методы</text>
  <line x1="45" y1="178" x2="285" y2="178" stroke="#a9bdd2" stroke-width="1"/>
  <text x="42" y="202" font-size="13" fill="#33475b">• целочисленное линейное</text>
  <text x="42" y="220" font-size="13" fill="#33475b">  программирование (ILP)</text>
  <text x="42" y="244" font-size="13" fill="#33475b">• метод ветвей и границ</text>
  <text x="42" y="268" font-size="13" fill="#33475b">• метод ветвей и отсечений</text>
  <text x="42" y="318" font-size="12.5" fill="#2e7d4f">+ гарантия оптимальности</text>
  <text x="42" y="344" font-size="12.5" fill="#c0392b">− низкая масштабируемость</text>
  <text x="42" y="362" font-size="12.5" fill="#c0392b">  (NP-трудность)</text>

  <!-- branch 2: metaheuristics -->
  <rect x="350" y="140" width="280" height="270" rx="8" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
  <text x="490" y="166" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f2d3d">Метаэвристики</text>
  <line x1="370" y1="178" x2="610" y2="178" stroke="#a9bdd2" stroke-width="1"/>
  <text x="367" y="202" font-size="13" fill="#33475b">• жадные алгоритмы</text>
  <text x="367" y="226" font-size="13" fill="#33475b">• генетические алгоритмы</text>
  <text x="367" y="250" font-size="13" fill="#33475b">• имитация отжига</text>
  <text x="367" y="274" font-size="13" fill="#33475b">• табу-поиск, муравьиные</text>
  <text x="367" y="318" font-size="12.5" fill="#2e7d4f">+ высокая масштабируемость</text>
  <text x="367" y="344" font-size="12.5" fill="#c0392b">− нет гарантий оптимума</text>
  <text x="367" y="362" font-size="12.5" fill="#c0392b">− тонкая настройка параметров</text>

  <!-- branch 3: CP (chosen) -->
  <rect x="675" y="140" width="280" height="270" rx="8" fill="#dff0e6" stroke="#2e7d4f" stroke-width="2.2"/>
  <text x="815" y="166" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f3d2a">Программирование</text>
  <text x="815" y="184" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1f3d2a">в ограничениях (CP / CP-SAT)</text>
  <line x1="695" y1="196" x2="935" y2="196" stroke="#94c4a8" stroke-width="1"/>
  <text x="692" y="220" font-size="13" fill="#2a4d38">• декларативная модель</text>
  <text x="692" y="244" font-size="13" fill="#2a4d38">• распространение ограничений</text>
  <text x="692" y="268" font-size="13" fill="#2a4d38">• SAT-вывод (CDCL) + LP</text>
  <text x="692" y="318" font-size="12.5" fill="#2e7d4f">+ полнота (оптимум / вывод)</text>
  <text x="692" y="342" font-size="12.5" fill="#2e7d4f">+ высокая эффективность</text>
  <text x="692" y="366" font-size="12.5" fill="#2e7d4f">+ лёгкое добавление правил</text>
  <!-- chosen badge -->
  <rect x="735" y="382" width="160" height="22" rx="11" fill="#2e7d4f"/>
  <text x="815" y="398" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">выбран в работе</text>
</svg>

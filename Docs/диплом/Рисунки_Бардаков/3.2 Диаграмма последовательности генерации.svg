<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34495e"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>

  <!-- lifeline headers -->
  <g font-size="12.5" font-weight="bold" fill="#1f2d3d" text-anchor="middle">
    <g>
      <rect x="35" y="22" width="120" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/>
      <text x="95" y="46">Клиент</text>
    </g>
    <g>
      <rect x="195" y="22" width="130" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/>
      <text x="260" y="46">Контроллер</text>
    </g>
    <g>
      <rect x="370" y="22" width="140" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/>
      <text x="440" y="40">Очередь /</text><text x="440" y="55">фоновая служба</text>
    </g>
    <g>
      <rect x="555" y="22" width="130" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/>
      <text x="620" y="46">Обработчик</text>
    </g>
    <g>
      <rect x="725" y="22" width="130" height="40" rx="5" fill="#dff0e6" stroke="#2e7d4f" stroke-width="1.3"/>
      <text x="790" y="46">Солвер CP-SAT</text>
    </g>
    <g>
      <rect x="875" y="22" width="110" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/>
      <text x="930" y="46">БД</text>
    </g>
  </g>

  <!-- lifelines -->
  <g stroke="#9bb0c4" stroke-width="1.2" stroke-dasharray="4 4">
    <line x1="95" y1="62" x2="95" y2="565"/>
    <line x1="260" y1="62" x2="260" y2="565"/>
    <line x1="440" y1="62" x2="440" y2="565"/>
    <line x1="620" y1="62" x2="620" y2="565"/>
    <line x1="790" y1="62" x2="790" y2="565"/>
    <line x1="930" y1="62" x2="930" y2="565"/>
  </g>

  <!-- loop frame -->
  <rect x="70" y="214" width="910" height="262" rx="4" fill="none" stroke="#7f8c9b" stroke-width="1.2"/>
  <rect x="70" y="214" width="150" height="22" fill="#7f8c9b"/>
  <text x="80" y="230" font-size="12" font-weight="bold" fill="#ffffff">loop по неделям</text>

  <g font-size="12" fill="#33475b">
    <!-- 1 -->
    <line x1="95" y1="100" x2="258" y2="100" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="176" y="94" text-anchor="middle">POST /generate (институт | семестр)</text>
    <!-- 2 -->
    <line x1="260" y1="132" x2="438" y2="132" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="350" y="126" text-anchor="middle">поставить задачу (jobId)</text>
    <!-- return jobId -->
    <line x1="260" y1="162" x2="97" y2="162" stroke="#34495e" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="178" y="156" text-anchor="middle">jobId (202 Accepted)</text>
    <!-- service -> handler -->
    <line x1="440" y1="196" x2="618" y2="196" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="530" y="190" text-anchor="middle">выполнить задачу</text>

    <!-- in loop: handler -> DB getForWeek -->
    <line x1="620" y1="258" x2="928" y2="258" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="774" y="252" text-anchor="middle">данные недели: нагрузка, ресурсы, якоря</text>
    <line x1="930" y1="286" x2="622" y2="286" stroke="#34495e" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="776" y="280" text-anchor="middle">строки нагрузки и слотов</text>
    <!-- handler -> solver -->
    <line x1="620" y1="322" x2="788" y2="322" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="704" y="316" text-anchor="middle">решить (фаза 1 → фаза 2)</text>
    <line x1="790" y1="356" x2="622" y2="356" stroke="#34495e" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="706" y="350" text-anchor="middle">назначения</text>
    <!-- handler -> DB write -->
    <line x1="620" y1="392" x2="928" y2="392" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="774" y="386" text-anchor="middle">запись недели (SERIALIZABLE)</text>
    <!-- handler -> client progress -->
    <line x1="620" y1="450" x2="97" y2="450" stroke="#2e7d4f" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="360" y="444" text-anchor="middle" fill="#1f5736">прогресс по неделям / ScheduleChanged (SignalR)</text>

    <!-- poll status -->
    <line x1="95" y1="506" x2="258" y2="506" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="176" y="500" text-anchor="middle">GET /generate/status/{jobId}</text>
    <line x1="260" y1="536" x2="97" y2="536" stroke="#34495e" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="178" y="530" text-anchor="middle">статус, метрики, недоразмещённые</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="610" viewBox="0 0 900 610" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#34495e"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2e7d4f"/></marker>
  </defs>
  <rect width="900" height="610" fill="#ffffff"/>

  <rect x="30" y="28" width="840" height="466" rx="10" fill="#f5f8fb" stroke="#34495e" stroke-width="1.6"/>
  <text x="48" y="52" font-size="14" font-weight="bold" fill="#2c3e50">Клиентское приложение (Vue 3 SPA, TypeScript)</text>

  <!-- entry -->
  <rect x="330" y="64" width="240" height="40" rx="6" fill="#34495e"/>
  <text x="450" y="89" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">main.ts → App.vue</text>
  <line x1="450" y1="104" x2="450" y2="128" stroke="#34495e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- UI layer -->
  <rect x="60" y="130" width="780" height="86" rx="8" fill="#eaf2fb" stroke="#2c5d8a" stroke-width="1.5"/>
  <text x="450" y="156" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1f3a57">Представление: components (разделы-вкладки, сетки) и views (страницы)</text>
  <text x="450" y="180" text-anchor="middle" font-size="12.5" fill="#33475b">базовые переиспользуемые элементы: BaseButton, BaseInput, BaseSelect</text>
  <text x="450" y="200" text-anchor="middle" font-size="12" fill="#5a6b7b">реактивное обновление интерфейса при изменении состояния</text>

  <line x1="170" y1="216" x2="170" y2="248" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="450" y1="216" x2="450" y2="248" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="720" y1="216" x2="720" y2="248" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- middle layer: router / stores / composables -->
  <rect x="60" y="250" width="220" height="96" rx="8" fill="#fff" stroke="#34495e" stroke-width="1.4"/>
  <text x="170" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2d3d">router</text>
  <text x="170" y="296" text-anchor="middle" font-size="11.8" fill="#5a6b7b">маршрутизация и</text>
  <text x="170" y="312" text-anchor="middle" font-size="11.8" fill="#5a6b7b">контроль доступа</text>

  <rect x="300" y="250" width="300" height="96" rx="8" fill="#fff" stroke="#34495e" stroke-width="1.4"/>
  <text x="450" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2d3d">stores (Pinia)</text>
  <text x="450" y="296" text-anchor="middle" font-size="11.8" fill="#5a6b7b">сессия · реальное время ·</text>
  <text x="450" y="312" text-anchor="middle" font-size="11.8" fill="#5a6b7b">кэш справочников</text>

  <rect x="620" y="250" width="220" height="96" rx="8" fill="#fff" stroke="#34495e" stroke-width="1.4"/>
  <text x="730" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2d3d">composables</text>
  <text x="730" y="296" text-anchor="middle" font-size="11.8" fill="#5a6b7b">уведомления, всплывающие</text>
  <text x="730" y="312" text-anchor="middle" font-size="11.8" fill="#5a6b7b">сообщения, async-состояния</text>

  <line x1="170" y1="346" x2="170" y2="380" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="450" y1="346" x2="450" y2="380" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="730" y1="346" x2="730" y2="380" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- api layer -->
  <rect x="60" y="382" width="780" height="86" rx="8" fill="#dfeaf5" stroke="#2c5d8a" stroke-width="1.6"/>
  <text x="450" y="408" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1f3a57">api — слой доступа к серверу</text>
  <text x="450" y="432" text-anchor="middle" font-size="12.5" fill="#33475b">единый HTTP-клиент · модули по ресурсам · типы данных · хранилище сессии (localStorage)</text>
  <text x="450" y="452" text-anchor="middle" font-size="12" fill="#5a6b7b">типы разделяются между слоем доступа и компонентами</text>

  <!-- server -->
  <rect x="270" y="524" width="360" height="60" rx="8" fill="#eaf7ef" stroke="#2e7d4f" stroke-width="1.8"/>
  <text x="450" y="560" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1f5736">Серверная часть (ASP.NET Core)</text>

  <line x1="380" y1="468" x2="380" y2="522" stroke="#34495e" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="320" y="500" text-anchor="middle" font-size="11.5" fill="#34495e">REST</text>
  <line x1="520" y1="468" x2="520" y2="522" stroke="#2e7d4f" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="585" y="500" text-anchor="middle" font-size="11.5" fill="#2e7d4f">SignalR</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34495e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="540" fill="#ffffff"/>

  <!-- Data sources -->
  <g>
    <rect x="30" y="30" width="270" height="68" rx="6" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
    <text x="165" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2d3d">«Нагрузка ВУЗа»</text>
    <text x="165" y="80" text-anchor="middle" font-size="13" fill="#33475b">учебная нагрузка</text>

    <rect x="355" y="30" width="270" height="68" rx="6" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
    <text x="490" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2d3d">ММИС «Деканат»</text>
    <text x="490" y="80" text-anchor="middle" font-size="13" fill="#33475b">группы и преподаватели</text>

    <rect x="680" y="30" width="270" height="68" rx="6" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
    <text x="815" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2d3d">Списки аудиторий</text>
    <text x="815" y="80" text-anchor="middle" font-size="13" fill="#33475b">аудиторный фонд</text>
  </g>

  <!-- arrows from sources to bureau -->
  <path d="M165,98 L165,120 L490,120" fill="none" stroke="#34495e" stroke-width="1.5"/>
  <path d="M815,98 L815,120 L490,120" fill="none" stroke="#34495e" stroke-width="1.5"/>
  <path d="M490,98 L490,150" fill="none" stroke="#34495e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bureau -->
  <rect x="300" y="152" width="380" height="62" rx="6" fill="#dff0e6" stroke="#2e7d4f" stroke-width="1.8"/>
  <text x="490" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f3d2a">Бюро расписаний — 7 сотрудников</text>
  <text x="490" y="200" text-anchor="middle" font-size="13" fill="#2a4d38">институты закреплены за сотрудниками</text>

  <path d="M490,214 L490,250" fill="none" stroke="#34495e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="300" y="252" width="380" height="52" rx="6" fill="#f4f6f8" stroke="#34495e" stroke-width="1.5"/>
  <text x="490" y="284" text-anchor="middle" font-size="14" fill="#1f2d3d">Ручное распределение занятий на бумаге</text>

  <path d="M490,304 L490,338" fill="none" stroke="#34495e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="300" y="340" width="380" height="58" rx="6" fill="#f4f6f8" stroke="#34495e" stroke-width="1.5"/>
  <text x="490" y="365" text-anchor="middle" font-size="14" fill="#1f2d3d">Перенос в таблицы Microsoft Excel</text>
  <text x="490" y="385" text-anchor="middle" font-size="13" fill="#5a6b7b">макросы VBA, написанные в начале 2000-х</text>

  <path d="M490,398 L490,432" fill="none" stroke="#34495e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="300" y="434" width="380" height="52" rx="6" fill="#eaf2fb" stroke="#34495e" stroke-width="1.5"/>
  <text x="490" y="466" text-anchor="middle" font-size="14" fill="#1f2d3d">Публикация на официальном сайте университета</text>

  <!-- Problems box -->
  <rect x="710" y="200" width="245" height="286" rx="8" fill="#fdeded" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="832" y="226" text-anchor="middle" font-size="14" font-weight="bold" fill="#922b21">Системные проблемы</text>
  <text x="724" y="256" font-size="12.5" fill="#7b241c">• коллизии при совместной</text>
  <text x="724" y="274" font-size="12.5" fill="#7b241c">  работе над файлами</text>
  <text x="724" y="298" font-size="12.5" fill="#7b241c">• задержка публикации</text>
  <text x="724" y="316" font-size="12.5" fill="#7b241c">  до трёх дней</text>
  <text x="724" y="340" font-size="12.5" fill="#7b241c">• ручная сверка нагрузки</text>
  <text x="724" y="364" font-size="12.5" fill="#7b241c">• устаревший инструментарий</text>
  <text x="724" y="382" font-size="12.5" fill="#7b241c">  без поддержки</text>
  <text x="724" y="406" font-size="12.5" fill="#7b241c">• «окна» и нерациональное</text>
  <text x="724" y="424" font-size="12.5" fill="#7b241c">  использование аудиторий</text>
  <path d="M708,360 L686,360" fill="none" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr)"/>
</svg>

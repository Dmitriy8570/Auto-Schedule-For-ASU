<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#34495e"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2e7d4f"/></marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>

  <!-- headers -->
  <g text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1f2d3d">
    <rect x="55" y="22" width="150" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/><text x="130" y="46">Клиент (SPA)</text>
    <rect x="330" y="22" width="150" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/><text x="405" y="46">REST API</text>
    <rect x="580" y="22" width="150" height="40" rx="5" fill="#dff0e6" stroke="#2e7d4f" stroke-width="1.3"/><text x="655" y="46">Хаб SignalR</text>
    <rect x="820" y="22" width="120" height="40" rx="5" fill="#eaf2fb" stroke="#34495e" stroke-width="1.3"/><text x="880" y="46">БД</text>
  </g>
  <g stroke="#9bb0c4" stroke-width="1.2" stroke-dasharray="4 4">
    <line x1="130" y1="62" x2="130" y2="525"/>
    <line x1="405" y1="62" x2="405" y2="525"/>
    <line x1="655" y1="62" x2="655" y2="525"/>
    <line x1="880" y1="62" x2="880" y2="525"/>
  </g>

  <g font-size="12" fill="#33475b">
    <!-- login -->
    <line x1="130" y1="98" x2="403" y2="98" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="266" y="92" text-anchor="middle">POST /auth/login (логин, пароль)</text>
    <line x1="405" y1="126" x2="878" y2="126" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="640" y="120" text-anchor="middle">проверка учётной записи</text>
    <line x1="405" y1="156" x2="132" y2="156" stroke="#34495e" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="266" y="150" text-anchor="middle">токен JWT → сохранение в localStorage</text>
    <!-- connect hub -->
    <line x1="130" y1="190" x2="653" y2="190" stroke="#2e7d4f" stroke-width="1.4" marker-end="url(#g)"/>
    <text x="380" y="184" text-anchor="middle" fill="#1f5736">подключение к хабу (токен в query access_token)</text>

    <!-- loop -->
    <rect x="50" y="214" width="900" height="250" rx="4" fill="none" stroke="#7f8c9b" stroke-width="1.2"/>
    <rect x="50" y="214" width="160" height="22" fill="#7f8c9b"/><text x="60" y="230" font-size="12" font-weight="bold" fill="#fff">loop во время работы</text>

    <line x1="130" y1="262" x2="403" y2="262" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="266" y="256" text-anchor="middle">запрос с заголовком Authorization: Bearer</text>
    <line x1="405" y1="290" x2="878" y2="290" stroke="#34495e" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="640" y="284" text-anchor="middle">чтение / запись данных</text>
    <line x1="405" y1="320" x2="132" y2="320" stroke="#34495e" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="266" y="314" text-anchor="middle">JSON-ответ · 401 → выход · 409 → коллизии</text>

    <!-- realtime push -->
    <line x1="655" y1="378" x2="132" y2="378" stroke="#2e7d4f" stroke-width="1.5" marker-end="url(#g)"/>
    <text x="400" y="372" text-anchor="middle" fill="#1f5736">ScheduleChanged / WorkloadChanged (событие реального времени)</text>

    <!-- self reload -->
    <path d="M130,408 h70 v28 h-68" fill="none" stroke="#34495e" stroke-width="1.3" marker-end="url(#a)"/>
    <text x="210" y="426" text-anchor="start">tick++ → перезагрузка данных по REST</text>
  </g>
  <text x="490" y="498" text-anchor="middle" font-size="11.5" fill="#7a8694">Канал реального времени односторонний (сервер → клиент); при его недоступности источником истины остаётся REST</text>
</svg>

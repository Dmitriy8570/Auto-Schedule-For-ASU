services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    container_name: auto-schedule-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoSchedule}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-autoSchedule}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ---------- Backend (.NET API) ----------
  backend:
    build:
      context: ./backend-auto-schedule
      dockerfile: Dockerfile
    container_name: auto-schedule-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G          # 6G-12G в зависимости от хоста
        reservations:
          cpus: '0.5'
          memory: 3G
    depends_on:
      db:
        condition: service_healthy
      mmis-db:
        condition: service_healthy
      ad-dc:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      # Подключение к контейнеру БД (хост = имя сервиса "db" во внутренней сети).
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-autoSchedule};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      # Источник нагрузки — контейнер MMIS (MS SQL). Хост = имя сервиса "mmis-db".
      Mmis__ConnectionString: "Server=mmis-db,1433;Database=MMIS;User Id=sa;Password=${MMIS_SA_PASSWORD:-Mmis_Str0ng_Pass!};TrustServerCertificate=True;Encrypt=False"
      Mmis__SyncAtTime: "${MMIS_SYNC_AT_TIME:-03:00}"
      # Сидер инфраструктуры: аудиторный фонд + календарная сетка (оси «аудитории»/«время»),
      # которых нет в ММИС. Без него генерация Infeasible. Размерность сетки настраивается.
      InfrastructureSeed__Enabled: "${SEED_ENABLED:-true}"
      InfrastructureSeed__WorkingDays: "${SEED_WORKING_DAYS:-6}"
      InfrastructureSeed__PairsPerDay: "${SEED_PAIRS_PER_DAY:-8}"
      # Аутентификация в Active Directory (хост = имя сервиса "ad-dc").
      ActiveDirectory__Host: ad-dc
      ActiveDirectory__Port: "636"
      ActiveDirectory__UseSsl: "true"
      ActiveDirectory__IgnoreCertificateErrors: "true"
      ActiveDirectory__Realm: ${AD_REALM:-TEST.MC}
      ActiveDirectory__BaseDn: ${AD_BASE_DN:-DC=test,DC=mc}
      ActiveDirectory__RequiredGroup: ${AD_GROUP:-ScheduleBureau}
      # libldap: не проверять самоподписанный сертификат DC (лабораторная среда).
      LDAPTLS_REQCERT: never
      # Подпись JWT — обязательно переопределить в production.
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-change-me-please-use-a-32+byte-secret-key}
      Jwt__Issuer: ${JWT_ISSUER:-auto-schedule}
      Jwt__Audience: ${JWT_AUDIENCE:-auto-schedule}
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    networks:
      - app-network

  # ---------- MMIS (имитация исходной БД MS SQL) ----------
  mmis-db:
    build:
      context: ./mmis-mssql
      dockerfile: Dockerfile
    container_name: auto-schedule-mmis
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MMIS_SA_PASSWORD:-Mmis_Str0ng_Pass!}
    ports:
      - "${MMIS_PORT:-1433}:1433"
    volumes:
      - mmis-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - app-network

  # ---------- Active Directory (Samba AD DC) ----------
  ad-dc:
    build:
      context: ./ad-dc
      dockerfile: Dockerfile
    container_name: auto-schedule-ad
    hostname: dc1
    restart: unless-stopped
    # Samba AD DC требует расширенных привилегий (xattr, setcap и т.п.).
    privileged: true
    environment:
      AD_REALM: ${AD_REALM:-TEST.MC}
      AD_DOMAIN: ${AD_DOMAIN:-TEST}
      AD_ADMIN_PASSWORD: ${AD_ADMIN_PASSWORD:-P@ssw0rd2024!}
      # Группа «Бюро расписаний».
      AD_GROUP: ${AD_GROUP:-ScheduleBureau}
      AD_GROUP_DESC: ${AD_GROUP_DESC:-Бюро расписаний}
      # Единственный пользователь домена.
      AD_USER: ${AD_USER:-i.petrov}
      AD_USER_PASSWORD: ${AD_USER_PASSWORD:-Schedule2024!}
    ports:
      - "${AD_LDAP_PORT:-389}:389"     # LDAP
      - "${AD_LDAPS_PORT:-636}:636"    # LDAPS
      - "${AD_KERBEROS_PORT:-88}:88"   # Kerberos
    volumes:
      - ad-data:/var/lib/samba
      - ad-conf:/etc/samba
    networks:
      - app-network

  # ---------- Frontend (Vue + nginx) ----------
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: auto-schedule-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - app-network

volumes:
  postgres-data:
  mmis-data:
  ad-data:
  ad-conf:

networks:
  app-network:
    driver: bridge
